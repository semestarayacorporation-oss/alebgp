<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ALBATROS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./assets/styles/custom.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-700">BGP Logistics</h1>
            <p class="text-slate-500 mt-2 text-sm">PT. Albatros Logistik Express</p>
        </div>
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" id="username" value="admin" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" id="password" value="password" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors duration-200">
                Sign In
            </button>
        </form>
    </div>

    <script type="module">
        import { initDB } from './assets/js/db.js';
        
        // Inisialisasi mock database saat pertama kali load
        initDB();

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            // Mock Auth
            if(user) {
                localStorage.setItem('_session', JSON.stringify({
                    username: user,
                    role: user === 'admin' ? 'Super Admin' : 'Staff',
                    name: 'Taufik Kulrahman'
                }));
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
