<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile | Albatros Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-200 flex justify-center text-gray-800">
    <div class="w-full max-w-md bg-white min-h-screen shadow-2xl relative flex flex-col">
        
        <header class="bg-blue-700 text-white p-4 rounded-b-2xl shadow-md z-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center">
                    <i class="fas fa-truck-fast text-blue-700 text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg">Albatros Express</h1>
                    <p class="text-xs text-blue-200">Mobile Utility Services</p>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-20">
            <div class="bg-white border rounded-xl p-5 shadow-sm mb-4">
                <h2 class="font-bold text-lg mb-3 flex items-center gap-2">
                    <i class="fas fa-search-location text-blue-600"></i> Lacak Pengiriman
                </h2>
                <div class="flex gap-2">
                    <input type="text" placeholder="Masukkan No. Resi..." class="w-full border-gray-300 rounded-lg p-3 border text-sm focus:outline-none focus:border-blue-500">
                    <button class="bg-blue-600 text-white px-4 rounded-lg hover:bg-blue-700">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-gray-50 border rounded-xl p-4 text-center active:bg-gray-100">
                    <i class="fas fa-calculator text-2xl text-orange-500 mb-2"></i>
                    <h3 class="font-semibold text-sm">Cek Tarif</h3>
                </div>
                <div class="bg-gray-50 border rounded-xl p-4 text-center active:bg-gray-100">
                    <i class="fas fa-map-marker-alt text-2xl text-red-500 mb-2"></i>
                    <h3 class="font-semibold text-sm">Lokasi Drop</h3>
                </div>
            </div>

            <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 mt-6">
                <h3 class="font-bold text-blue-900 text-sm mb-1">Khusus Staf & Operasional</h3>
                <p class="text-xs text-gray-600 mb-3">Login untuk proses POD dan Pickup.</p>
                <a href="dashboard.html#/login" class="block w-full text-center bg-blue-700 text-white text-sm font-semibold py-2 rounded-lg">Masuk Dashboard</a>
            </div>
        </main>

    </div>
</body>
</html>
