<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate | PT. Albatros Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <nav class="bg-white shadow-md fixed w-full z-50 top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-700 rounded-md"></div>
                    <span class="font-bold text-xl tracking-tight text-blue-900">Albatros Express</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="#home" class="text-gray-600 hover:text-blue-600">Beranda</a>
                    <a href="#services" class="text-gray-600 hover:text-blue-600">Layanan</a>
                    <a href="#tracking" class="text-gray-600 hover:text-blue-600">Lacak Pengiriman</a>
                    <a href="dashboard.html#/login" class="bg-blue-700 text-white px-5 py-2 rounded-lg font-medium hover:bg-blue-800 transition shadow-lg">Internal Login</a>
                </div>
            </div>
        </div>
    </nav>

    <section id="home" class="pt-24 pb-12 bg-blue-900 text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center">
            <div class="md:w-1/2 py-10">
                <h1 class="text-4xl md:text-5xl font-extrabold leading-tight mb-4">Solusi Logistik Terpadu untuk Enterprise Anda</h1>
                <p class="text-blue-200 text-lg mb-8">PT. Albatros Express, BGPL provider Logistics. Kecepatan, keamanan, dan keandalan dalam setiap pengiriman kargo dan distribusi skala besar.</p>
                <div class="flex space-x-4">
                    <a href="#tracking" class="bg-white text-blue-900 px-6 py-3 rounded-lg font-bold hover:bg-gray-100 transition">Cek Resi Sekarang</a>
                </div>
            </div>
            <div class="md:w-1/2 mt-10 md:mt-0 bg-white rounded-xl p-6 shadow-xl text-gray-800 w-full max-w-md ml-auto">
                <h3 class="text-xl font-bold mb-4 border-b pb-2">Simulasi Tarif</h3>
                <form onsubmit="event.preventDefault(); alert('Modul Harga Sedang Diperbarui');">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Kota Asal</label>
                        <select class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500 focus:border-blue-500"><option>Jakarta</option><option>Surabaya</option></select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Kota Tujuan</label>
                        <select class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500 focus:border-blue-500"><option>Batam</option><option>Pekanbaru</option></select>
                    </div>
                    <div class="mb-4 flex gap-4">
                        <div class="w-1/2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Berat (Kg)</label>
                            <input type="number" class="w-full border-gray-300 rounded-lg p-2 border" placeholder="10">
                        </div>
                        <div class="w-1/2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Layanan</label>
                            <select class="w-full border-gray-300 rounded-lg p-2 border"><option>PRI</option><option>REG</option></select>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700">Hitung Biaya</button>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
