<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BGPL Albatros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./assets/styles/custom.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex h-screen overflow-hidden">
    
    <aside id="sidebar" class="w-64 bg-indigo-900 text-white flex flex-col transition-all duration-300">
        <div class="p-4 border-b border-indigo-800 flex justify-between items-center">
            <span class="text-xl font-bold tracking-wider">ALBATROS</span>
        </div>
        <nav id="sidebar-nav" class="flex-1 overflow-y-auto py-4"></nav>
        <div class="p-4 border-t border-indigo-800">
            <button id="logoutBtn" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded">Logout</button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center">
            <h2 id="page-title" class="text-xl font-semibold text-gray-800">Dashboard</h2>
            <div class="flex items-center space-x-4">
                <span id="userInfo" class="text-sm font-medium text-gray-600"></span>
            </div>
        </header>
        <main class="flex-1 overflow-y-auto p-6" id="app-content">
            </main>
    </div>

    <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
