<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ZOLOG System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./assets/styles/custom.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-sans overflow-hidden">
    <div class="flex h-screen w-full">
        <aside class="w-64 bg-slate-900 text-white flex flex-col transition-all duration-300 z-20" id="sidebar">
            <div class="h-16 flex items-center px-6 border-b border-slate-800">
                <h2 class="text-xl font-bold tracking-wider text-indigo-400">ZOLOG <span class="text-sm font-normal text-slate-400">Bgp</span></h2>
            </div>
            <nav class="flex-1 overflow-y-auto py-4 space-y-1 px-3">
                <a href="#/dashboard-ops" class="nav-link block px-3 py-2.5 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-colors">Dashboard Operasional</a>
                <a href="#/operasional-flow" class="nav-link block px-3 py-2.5 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-colors">Flow Operasional & POD</a>
               
                <a href="#/resi-cash" class="nav-link block px-3 py-2.5 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-colors">Entri Resi Cash</a>
                <a href="#/master-pelanggan" class="nav-link block px-3 py-2.5 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-colors">Master Pelanggan</a>
                 <a href="#/master-user" class="nav-link block px-3 py-2.5 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-colors">Master User</a>
<a href="#/ar-ap" class="nav-link block px-3 py-2.5 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-colors">AR / AP (Keuangan)</a>
                         
            </nav>
            <div class="p-4 border-t border-slate-800">
                <div class="text-sm text-slate-400 mb-2" id="userInfo">Loading...</div>
                <button id="logoutBtn" class="w-full text-left px-3 py-2 text-red-400 hover:bg-slate-800 rounded-lg transition-colors">Logout</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="h-16 bg-white shadow-sm border-b border-slate-200 flex items-center justify-between px-6 z-10">
                <div class="flex items-center gap-4">
                    <button id="sidebarToggle" class="text-slate-500 hover:text-slate-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 class="text-lg font-semibold text-slate-800" id="pageTitle">Dashboard</h1>
                </div>
            </header>

            <div id="app-content" class="flex-1 overflow-y-auto p-6">
                </div>
        </main>
    </div>

    <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
